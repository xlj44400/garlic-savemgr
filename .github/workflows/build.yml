name: Build and Release

on:
  push:
    paths-ignore:
      - "**/*.md"
      - "**/*.txt"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "**/*.txt"
  workflow_dispatch:


permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo apt-get update
          sudo apt-get install -y llvm clang lld

      - name: Download PS5 Payload SDK
        run: |
          curl -L -o /tmp/ps5-payload-sdk.zip \
            https://github.com/ps5-payload-dev/sdk/releases/latest/download/ps5-payload-sdk.zip
          unzip /tmp/ps5-payload-sdk.zip -d /tmp

      - name: Build
        run: make PS5_PAYLOAD_SDK=/tmp/ps5-payload-sdk

      - name: Prepare release files
        run: |
          mkdir -p release
          cp garlic-savemgr.elf release/
          ls -la release
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: garlic-savemgr-ps4
          path: release/*
          if-no-files-found: error
