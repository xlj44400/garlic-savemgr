<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>GarlicMgr</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box }

    :root {
      --bg: #06060e; --s1: #0c0c1a; --bd: #1a1a35;
      --ac: #0070ff; --ac2: #00bbff; --gl: rgba(0,112,255,.15);
      --tx: #d0d0e4; --dm: #505068;
      --ok: #00dd77; --er: #ff2244; --lb: #040408;
    }

    body {
      font-family: -apple-system, system-ui, sans-serif;
      background: radial-gradient(ellipse at 10% 40%, #0c1424, var(--bg) 65%);
      color: var(--tx); height: 100vh;
      display: flex; flex-direction: column; overflow: hidden;
    }

    ::-webkit-scrollbar { width: 5px }
    ::-webkit-scrollbar-track { background: transparent }
    ::-webkit-scrollbar-thumb { background: var(--bd); border-radius: 3px }

    /* ── Nav ─────────────────────────────────────────── */
    nav {
      height: 48px; background: var(--s1);
      border-bottom: 1px solid var(--bd);
      display: flex; align-items: center;
      padding: 0 20px; gap: 6px;
      flex-shrink: 0; position: relative;
    }
    nav::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--ac), transparent); opacity: .3;
    }

    .logo {
      font-size: 14px; font-weight: 800; letter-spacing: 3px;
      text-transform: uppercase; margin-right: 20px;
      background: linear-gradient(135deg, var(--ac), var(--ac2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .tab {
      background: none; border: 1px solid transparent; color: var(--dm);
      font-size: 11px; font-weight: 600; padding: 5px 14px;
      cursor: pointer; border-radius: 16px; transition: all .2s;
      letter-spacing: .5px; text-transform: uppercase;
    }
    .tab:hover { color: var(--tx); border-color: var(--bd) }
    .tab.active {
      color: #fff; background: var(--ac); border-color: var(--ac);
      box-shadow: 0 0 12px var(--gl);
    }

    .spacer { flex: 1 }

    .shut {
      background: none; border: 1px solid var(--er); color: var(--er);
      padding: 5px 12px; border-radius: 16px; cursor: pointer;
      font-size: 10px; font-weight: 700;
      letter-spacing: .5px; text-transform: uppercase; transition: all .2s;
    }
    .shut:hover { background: var(--er); color: #fff }

    /* ── Layout ──────────────────────────────────────── */
    .main { flex: 1; display: flex; overflow: hidden }
    .main.full .left { display: none }
    .main.full .right { border-left: none }

    .left {
      width: 300px; min-width: 220px; display: flex; flex-direction: column;
      border-right: 1px solid var(--bd); background: var(--s1);
    }

    .shdr {
      padding: 10px 16px; font-size: 10px; font-weight: 700; color: var(--dm);
      text-transform: uppercase; letter-spacing: 1.5px;
      border-bottom: 1px solid var(--bd); flex-shrink: 0;
    }

    /* ── Save list ───────────────────────────────────── */
    .svs { flex: 1; overflow-y: auto }

    .sv {
      padding: 10px 14px; border-bottom: 1px solid rgba(26,26,53,.5);
      cursor: pointer; transition: all .15s; border-left: 2px solid transparent;
    }
    .sv:hover { background: rgba(255,255,255,.02) }
    .sv.sel {
      background: rgba(0,112,255,.08); border-left-color: var(--ac);
      box-shadow: inset 3px 0 8px -3px var(--gl);
    }
    .sv .tid { font-size: 12px; font-weight: 600; color: var(--tx); letter-spacing: .3px }
    .sv .sn {
      font-size: 11px; color: var(--dm); margin-top: 2px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .badge { display:inline-block; font-size:9px; font-weight:700; padding:1px 5px; border-radius:3px; float:right; margin-left:6px }
    .badge-ps4 { background:#1e6fbf; color:#fff }
    .badge-ps5 { background:#1a8a3f; color:#fff }

    /* ── Right panel ─────────────────────────────────── */
    .right { flex: 1; display: flex; flex-direction: column; overflow: hidden }

    .tb {
      padding: 10px 16px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
      border-bottom: 1px solid var(--bd); background: var(--s1);
      flex-shrink: 0; min-height: 40px;
    }

    .btn {
      background: var(--ac); color: #fff; border: none;
      padding: 6px 16px; border-radius: 16px; cursor: pointer;
      font-size: 11px; font-weight: 700; letter-spacing: .4px;
      text-transform: uppercase; transition: all .2s;
    }
    .btn:hover { box-shadow: 0 0 12px var(--gl); filter: brightness(1.1) }
    .btn:disabled { opacity: .25; cursor: not-allowed; box-shadow: none; filter: none }
    .btn.red { background: var(--er) }
    .btn.grn { background: var(--ok); color: #000 }

    /* ── Content area ────────────────────────────────── */
    .ct { flex: 1; overflow-y: auto; display: flex; flex-direction: column }
    .ct.ctr { align-items: center; justify-content: center }

    .drop {
      border: 2px dashed var(--bd); border-radius: 12px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 32px 48px; transition: all .2s; gap: 10px;
      max-width: 380px; width: 90%;
    }
    .drop.over { border-color: var(--ac); background: rgba(0,112,255,.06) }

    .dico { font-size: 32px; opacity: .5 }
    .dlbl { color: var(--dm); font-size: 12px; text-align: center; line-height: 1.6 }
    .dlbl b { color: var(--tx) }

    .bbtn {
      background: var(--ac); color: #fff; border: none;
      padding: 8px 24px; border-radius: 16px; cursor: pointer;
      font-size: 11px; font-weight: 700; letter-spacing: .4px;
      text-transform: uppercase; transition: all .2s; margin-top: 4px;
    }
    .bbtn:hover { box-shadow: 0 0 12px var(--gl); filter: brightness(1.1) }

    .dlnk {
      display: inline-block; padding: 10px 24px;
      background: var(--ok); color: #000; border-radius: 16px;
      text-decoration: none; font-weight: 700; font-size: 12px;
      letter-spacing: .4px; text-transform: uppercase;
      transition: all .2s; margin-top: 8px;
    }
    .dlnk:hover { filter: brightness(1.1); box-shadow: 0 0 12px rgba(0,221,119,.3) }

    /* ── File listing ────────────────────────────────── */
    .fi { padding: 6px 16px; font-size: 14px; color: var(--tx); display: flex; align-items: center }
    .fi.dir { color: var(--ac2); font-weight: 600; cursor: pointer }
    .fi .sz { color: var(--dm); font-size: 12px; margin-left: auto }

    .empty { padding: 40px; text-align: center; color: var(--dm); font-size: 12px; letter-spacing: .3px }
    .dh { padding: 16px; text-align: center; color: var(--dm); font-size: 11px; opacity: .4; margin-top: auto }

    /* ── Log panel ───────────────────────────────────── */
    .logw {
      height: 150px; border-top: 1px solid var(--bd);
      display: flex; flex-direction: column;
      flex-shrink: 0; background: var(--lb); position: relative;
    }
    .logw::before {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,20,10,.04) 2px, rgba(0,20,10,.04) 4px);
      pointer-events: none; z-index: 1;
    }

    .log {
      flex: 1; overflow-y: auto; padding: 6px 14px;
      font-family: 'SF Mono', Consolas, monospace; font-size: 11px; line-height: 1.7;
    }

    .ll { color: #4a6a5a; animation: fadeIn .2s ease }
    .ll.err { color: var(--er) }
    .ll.ok { color: var(--ok) }
    .ll .t { opacity: .35; margin-right: 8px }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(2px) }
      to { opacity: 1; transform: none }
    }

    /* ── Modal ───────────────────────────────────────── */
    .modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,.6);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; backdrop-filter: blur(4px);
    }
    .modal {
      background: var(--s1); border: 1px solid var(--bd); border-radius: 12px;
      padding: 24px; max-width: 380px; width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
    }
    .modal h3 { font-size: 14px; color: var(--tx); margin-bottom: 8px }
    .modal p { font-size: 12px; color: var(--dm); margin-bottom: 20px; word-break: break-all }
    .modal .btns { display: flex; gap: 8px; justify-content: flex-end }
    .modal .btns button {
      padding: 8px 20px; border: none; border-radius: 16px;
      font-size: 11px; font-weight: 700; letter-spacing: .4px;
      text-transform: uppercase; cursor: pointer; transition: all .2s;
    }
    .modal .mbtn-r { background: var(--er); color: #fff }
    .modal .mbtn-r:hover { filter: brightness(1.2) }
    .modal .mbtn-s { background: var(--bd); color: var(--tx) }
    .modal .mbtn-s:hover { background: var(--dm) }

    /* ── Context menu ────────────────────────────────── */
    .ctx-menu {
      position: fixed; background: var(--s1); border: 1px solid var(--bd);
      border-radius: 8px; padding: 4px 0; min-width: 140px;
      box-shadow: 0 4px 16px rgba(0,0,0,.5); z-index: 200;
    }
    .ctx-menu div {
      padding: 7px 14px; font-size: 12px; cursor: pointer;
      transition: background .1s;
    }
    .ctx-menu div:hover { background: rgba(255,255,255,.05) }
    .ctx-menu .ctx-del { color: var(--er) }

    /* ── Progress bar ────────────────────────────────── */
    .prog {
      width: 100%; height: 4px; background: var(--bd);
      border-radius: 2px; margin-top: 8px; overflow: hidden;
    }
    .prog-fill {
      height: 100%; background: var(--ac); border-radius: 2px;
      transition: width .15s; width: 0%;
    }
    .prog-text {
      font-size: 11px; color: var(--dm); margin-top: 6px;
      font-family: 'SF Mono', Consolas, monospace;
    }
  </style>
</head>
<body>

<!-- ── Navigation ──────────────────────────────────── -->
<nav>
  <span class="logo">GARLICMGR</span>
  <button class="tab active" onclick="switchTab('browse')">Browse</button>
  <button class="tab" onclick="switchTab('decrypt')">Decrypt</button>
  <button class="tab" onclick="switchTab('encrypt')">Encrypt</button>
  <button class="tab" onclick="switchTab('resign')">Resign</button>
  <span class="spacer"></span>
  <button class="shut" onclick="shutdown()">Kill GarlicMgr</button>
</nav>

<!-- ── Main layout ─────────────────────────────────── -->
<div class="main" id="mn">
  <div class="left">
    <div class="shdr">Saves</div>
    <div class="svs" id="svs"><div class="empty">Loading...</div></div>
  </div>
  <div class="right">
    <div class="tb" id="tb"></div>
    <div class="ct" id="ct"></div>
  </div>
</div>

<!-- ── Log panel ───────────────────────────────────── -->
<div class="logw">
  <div class="shdr">Terminal</div>
  <div class="log" id="log"></div>
</div>

<script>
/* ── State ─────────────────────────────────────────── */
let S = [], si = -1, tab = 'browse';
let mt = false, bsy = false;
let cf = [], ex = new Set();
let aid = '', stitle = '', mtid = '', mpt = '';

/* ── Utilities ─────────────────────────────────────── */
function $(id) { return document.getElementById(id) }

function esc(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;')
          .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function log(m, c) {
  const d = $('log'), t = new Date().toLocaleTimeString();
  d.innerHTML += '<div class="ll' + (c ? ' ' + c : '') + '">'
    + '<span class="t">' + t + '</span>' + esc(m) + '</div>';
  d.scrollTop = d.scrollHeight;
}

function fmtB(b) {
  if (b < 1024) return b + 'B';
  if (b < 1048576) return (b / 1024).toFixed(1) + 'K';
  return (b / 1048576).toFixed(1) + 'M';
}

/* ── XHR upload with progress ──────────────────────── */
function upload(url, file, onProgress, respType) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('POST', url);
    xhr.setRequestHeader('Content-Type', 'application/octet-stream');
    if (respType) xhr.responseType = respType;
    xhr.timeout = 300000; /* 5 min timeout for large saves */
    xhr.upload.onprogress = e => {
      if (e.lengthComputable && onProgress) onProgress(e.loaded, e.total);
    };
    xhr.onload = () => resolve(xhr);
    xhr.onerror = () => reject(new Error('Network error'));
    xhr.ontimeout = () => reject(new Error('Timeout'));
    xhr.send(file);
  });
}

function showProgress(pct, loaded, total) {
  let el = document.getElementById('upprog');
  if (!el) {
    const ct = $('ct');
    const drop = ct.querySelector('.drop');
    if (!drop) return;
    el = document.createElement('div');
    el.id = 'upprog';
    el.innerHTML = '<div class="prog"><div class="prog-fill"></div></div><div class="prog-text"></div>';
    drop.appendChild(el);
  }
  el.querySelector('.prog-fill').style.width = pct + '%';
  el.querySelector('.prog-text').textContent = fmtB(loaded) + ' / ' + fmtB(total) + ' (' + pct + '%)';
}

/* ── Drag & drop zone setup ────────────────────────── */
function setupDZ(id, fn) {
  const el = $(id);
  if (!el) return;
  el.ondragover = e => { e.preventDefault(); el.classList.add('over') };
  el.ondragleave = e => { e.preventDefault(); el.classList.remove('over') };
  el.ondrop = e => {
    e.preventDefault(); el.classList.remove('over');
    if (e.dataTransfer.files.length) fn(e.dataTransfer.files);
  };
  const b = el.querySelector('.bbtn');
  if (b) b.onclick = e => {
    e.stopPropagation();
    const i = document.createElement('input');
    i.type = 'file'; i.multiple = true;
    i.onchange = () => { if (i.files.length) fn(i.files) };
    i.click();
  };
}

/* ── Folder drag & drop zone setup ────────────────── */
function setupFolderDZ(id, fn) {
  const el = $(id);
  if (!el) return;
  el.ondragover = e => { e.preventDefault(); el.classList.add('over') };
  el.ondragleave = e => { e.preventDefault(); el.classList.remove('over') };
  el.ondrop = async e => {
    e.preventDefault(); el.classList.remove('over');
    const items = e.dataTransfer.items;
    if (!items || !items.length) return;
    const files = [];
    const entries = [];
    for (let i = 0; i < items.length; i++) {
      const entry = items[i].webkitGetAsEntry ? items[i].webkitGetAsEntry() : null;
      if (entry) entries.push(entry);
    }
    if (entries.length && entries[0].isDirectory) {
      const all = await readEntryRecursive(entries[0], '');
      if (all.length) fn(all, entries[0].name);
    } else if (e.dataTransfer.files.length) {
      fn(Array.from(e.dataTransfer.files));
    }
  };
  const b = el.querySelector('.bbtn');
  if (b) b.onclick = e => {
    e.stopPropagation();
    const i = document.createElement('input');
    i.type = 'file'; i.webkitdirectory = true;
    i.onchange = () => {
      if (i.files.length) {
        const prefix = i.files[0].webkitRelativePath.split('/')[0];
        fn(Array.from(i.files), prefix);
      }
    };
    i.click();
  };
}

/* ── Recursively read folder entries ──────────────── */
function readEntryRecursive(entry, basePath) {
  return new Promise(resolve => {
    if (entry.isFile) {
      entry.file(f => {
        f._path = basePath + f.name;
        resolve([f]);
      });
    } else if (entry.isDirectory) {
      const reader = entry.createReader();
      const all = [];
      const readBatch = () => {
        reader.readEntries(entries => {
          if (!entries.length) {
            Promise.all(all).then(arrs => resolve(arrs.flat()));
            return;
          }
          for (const e of entries) {
            all.push(readEntryRecursive(e, basePath + entry.name + '/'));
          }
          readBatch();
        });
      };
      readBatch();
    } else {
      resolve([]);
    }
  });
}

/* ── Tab switching ─────────────────────────────────── */
function switchTab(t) {
  tab = t;
  document.querySelectorAll('.tab').forEach((b, i) => {
    b.className = 'tab' + ((['browse', 'decrypt', 'encrypt', 'resign'][i] === t) ? ' active' : '');
  });
  $('mn').className = t === 'browse' ? 'main' : 'main full';
  if (t === 'browse') load();
  renderTB();
  renderCt();
}

/* ── Load saves list ───────────────────────────────── */
async function load() {
  try {
    const r = await fetch('/api/saves');
    const d = await r.json();
    S = d.saves || [];
    renderL();
    renderTB();
    log('Loaded ' + S.length + ' saves', 'ok');
  } catch (e) {
    log('Failed: ' + e.message, 'err');
    S = [];
    renderL();
  }
}

/* ── Render save list (left panel) ─────────────────── */
let exG = new Set(); /* expanded groups */

function renderL() {
  if (!S.length) {
    $('svs').innerHTML = '<div class="empty">No saves found</div>';
    return;
  }
  /* Group saves by title_id */
  const groups = [];
  const gmap = {};
  S.forEach((s, i) => {
    if (!gmap[s.title_id]) {
      gmap[s.title_id] = { title_id: s.title_id, name: s.title_name || s.title_id, items: [] };
      groups.push(gmap[s.title_id]);
    }
    gmap[s.title_id].items.push(i);
  });

  let h = '';
  groups.forEach(g => {
    const gtype = S[g.items[0]].type || 'ps5';
    const badge = '<span class="badge badge-' + gtype + '">' + gtype.toUpperCase() + '</span>';
    if (g.items.length === 1) {
      const i = g.items[0], s = S[i];
      h += '<div class="sv' + (i === si ? ' sel' : '') + '" onclick="sel(' + i + ')">';
      h += '<div class="tid">' + badge + esc(g.name) + '</div>';
      h += '<div class="sn">' + esc(s.save_name) + '</div></div>';
    } else {
      const open = exG.has(g.title_id);
      const anySel = g.items.includes(si);
      h += '<div class="sv' + (anySel ? ' sel' : '') + '" onclick="togG(\'' + esc(g.title_id) + '\')" style="cursor:pointer">';
      h += '<div class="tid">' + badge + (open ? '\u25BE ' : '\u25B8 ') + esc(g.name) + '</div>';
      h += '<div class="sn">' + g.items.length + ' saves</div></div>';
      if (open) {
        g.items.forEach(i => {
          const s = S[i];
          h += '<div class="sv' + (i === si ? ' sel' : '') + '" onclick="sel(' + i + ')" style="padding-left:28px">';
          h += '<div class="sn" style="color:var(--tx)">' + esc(s.save_name) + '</div></div>';
        });
      }
    }
  });
  $('svs').innerHTML = h;
}

function togG(tid) {
  if (exG.has(tid)) exG.delete(tid); else exG.add(tid);
  renderL();
}

/* ── Render content area ───────────────────────────── */
function renderCt() {
  const c = $('ct');

  if (tab === 'decrypt') {
    c.className = 'ct ctr';
    c.innerHTML =
      '<div class="drop" id="dz">'
      + '<div class="dlbl">Drag & drop encrypted save file</div>'
      + '<div style="font-size:11px;color:var(--dm);margin:6px 0">PS4: drop save image + .bin key together</div>'
      + '<button class="bbtn">Browse Files</button></div>';
    setupDZ('dz', decDrop);

  } else if (tab === 'encrypt') {
    c.className = 'ct ctr';
    c.innerHTML =
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">'
      + '<label style="font-size:12px;color:var(--dm);font-weight:600;text-transform:uppercase;letter-spacing:.5px">Account ID:</label>'
      + '<input id="eaid" type="text" maxlength="16" placeholder="optional" '
      + 'style="background:var(--bg);border:1px solid var(--bd);color:var(--tx);padding:6px 10px;border-radius:8px;font-family:monospace;font-size:13px;width:170px">'
      + '</div>'
      + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">'
      + '<label style="cursor:pointer;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--dm);font-weight:600;text-transform:uppercase;letter-spacing:.5px">'
      + '<input id="eps4" type="checkbox" style="accent-color:#1e6fbf;width:16px;height:16px"> PS4 Save'
      + '</label>'
      + '</div>'
      + '<div class="drop" id="dz">'
      + '<div class="dlbl">Drag & drop a <b>folder</b> to encrypt into a save</div>'
      + '<button class="bbtn">Browse Folder</button></div>';
    setupFolderDZ('dz', encDrop);

  } else if (tab === 'resign') {
    c.className = 'ct ctr';
    c.innerHTML =
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">'
      + '<label style="font-size:12px;color:var(--dm);font-weight:600;text-transform:uppercase;letter-spacing:.5px">New Account ID:</label>'
      + '<input id="raid" type="text" maxlength="16" placeholder="0000000000000000" '
      + 'style="background:var(--bg);border:1px solid var(--bd);color:var(--tx);padding:6px 10px;border-radius:8px;font-family:monospace;font-size:13px;width:170px">'
      + '</div>'
      + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">'
      + '<label style="font-size:12px;color:var(--dm);font-weight:600;text-transform:uppercase;letter-spacing:.5px">User ID:</label>'
      + '<input id="ruid" type="text" maxlength="8" placeholder="optional (uses local user)" '
      + 'style="background:var(--bg);border:1px solid var(--bd);color:var(--tx);padding:6px 10px;border-radius:8px;font-family:monospace;font-size:13px;width:240px">'
      + '</div>'
      + '<div class="drop" id="dz">'
      + '<div class="dlbl">Drag & drop encrypted save to resign</div>'
      + '<div style="font-size:11px;color:var(--dm);margin:6px 0">PS4: drop save image + .bin key together</div>'
      + '<button class="bbtn">Browse Files</button></div>';
    setupDZ('dz', resignDrop);

  } else {
    if (mt) {
      c.className = 'ct';
      renderF();
    } else {
      c.className = 'ct ctr';
      c.innerHTML = '<div class="drop"><div class="dlbl">Select a save to browse<br><br>Tip: Drag & drop files onto a mounted save to add or replace them</div></div>';
    }
  }
}

/* ── Render toolbar ────────────────────────────────── */
function renderTB() {
  let h = '';
  if (tab === 'browse' && mt) {
    h += '<img src="/api/icon?t=' + Date.now() + '" '
      + 'style="width:100px;height:56px;border-radius:6px;object-fit:cover" '
      + 'onerror="this.style.display=\'none\'">';

    h += '<div style="flex:1;min-width:0">';
    h += '<div style="font-size:16px;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'
      + (stitle ? esc(stitle) : 'Untitled') + '</div>';
    h += '<div style="font-size:13px;color:var(--dm);margin-top:2px">'
      + (mtid ? 'Title ID: <b style="color:var(--tx)">' + esc(mtid) + '</b>  ' : '')
      + (aid ? 'Account ID: <b style="color:var(--tx)">' + esc(aid) + '</b>' : '')
      + '</div>';
    h += (mpt ? '<div style="font-size:11px;color:var(--dm);margin-top:2px;opacity:.5">FTP: ' + esc(mpt) + '</div>' : '');
    h += '</div>';

    h += '<button class="btn grn" onclick="dlZip()" ' + (bsy ? 'disabled' : '') + '>Download Decrypted Zip</button>';
    h += '<button class="btn" onclick="dlBin()" ' + (bsy ? 'disabled' : '') + '>Download Encrypted</button>';
    h += '<button class="btn" onclick="dumpUsb()" ' + (bsy ? 'disabled' : '') + '>Dump to USB</button>';
    h += '<button class="btn red" onclick="um()" ' + (bsy ? 'disabled' : '') + '>Unmount</button>';
  }
  $('tb').innerHTML = h;
}

/* ── Select save ───────────────────────────────────── */
async function sel(i) {
  if (bsy || tab !== 'browse') return;
  si = i;
  renderL();
  await mountBrw(i);
}

/* ── Decrypt drop ──────────────────────────────────── */
async function decDrop(files) {
  if (bsy || !files.length) return;
  /* Check first byte to detect PS4 (0x01) vs PS5 (0x02) */
  const imgFile = files[0];
  const hdr = new Uint8Array(await imgFile.slice(0, 1).arrayBuffer());
  const isPS4 = (hdr[0] === 0x01);

  let binFile = null;
  if (isPS4) {
    /* Look for .bin in the dropped files */
    for (let i = 1; i < files.length; i++) {
      if (files[i].name.endsWith('.bin')) { binFile = files[i]; break; }
    }
    if (!binFile) {
      log('PS4 save detected — please drop both the save image and its .bin sealed key file together', 'err');
      return;
    }
  }

  bsy = true;
  $('ct').innerHTML = '<div class="drop"><div class="dlbl">Uploading for decrypt...</div></div>';
  try {
    /* For PS4, upload .bin key first */
    if (isPS4 && binFile) {
      log('Uploading PS4 sealed key ' + binFile.name + '...');
      const kxhr = await upload('/api/upload_key', binFile);
      if (kxhr.status !== 200) throw new Error('Failed to upload .bin key');
    }
    log('Uploading ' + imgFile.name + ' (' + fmtB(imgFile.size) + ')...');
    const xhr = await upload('/api/decrypt_upload' + (isPS4 ? '?ps4=1' : ''), imgFile, (loaded, total) => {
      const pct = Math.round(loaded * 100 / total);
      showProgress(pct, loaded, total);
    });
    if (xhr.status !== 200) {
      const d = JSON.parse(xhr.responseText);
      throw new Error(d.error || 'Failed');
    }
    log('Mounted — click Download to save decrypted files', 'ok');
    const name = imgFile.name.replace(/\.[^.]+$/, '') + '.zip';
    $('ct').innerHTML =
      '<div class="drop"><div class="dlbl">Decrypted successfully!</div>'
      + '<a class="dlnk" href="/api/download" download="' + esc(name) + '">Download .zip</a>'
      + '<br><button class="bbtn" style="margin-top:12px" onclick="fetch(\'/api/unmount\');renderCt()">Done</button></div>';
  } catch (e) {
    log('Error: ' + e.message, 'err');
    renderCt();
  }
  bsy = false;
}

/* ── Encrypt drop ──────────────────────────────────── */
async function encDrop(files, folderName) {
  if (bsy || !files || !files.length) return;
  const aidv = document.getElementById('eaid') ? document.getElementById('eaid').value.trim() : '';
  const isPS4 = document.getElementById('eps4') ? document.getElementById('eps4').checked : false;
  bsy = true;

  try {
    /* Calculate total size for PFS image sizing */
    let totalSize = 0;
    for (const f of files) totalSize += f.size;

    /* Step 1: create fresh PFS image and mount it */
    log('Creating ' + (isPS4 ? 'PS4' : 'PS5') + ' PFS image (' + fmtB(totalSize) + ' of files)...');
    $('ct').innerHTML = '<div class="drop"><div class="dlbl">Creating PFS image...</div></div>';
    let r = await fetch('/api/create_pfs?size=' + totalSize + (isPS4 ? '&ps4=1' : ''));
    let d = await r.json();
    if (d.error) throw new Error(d.error);
    log('PFS image created and mounted', 'ok');

    /* Step 2: upload each file */
    for (let i = 0; i < files.length; i++) {
      const f = files[i];
      const path = f._path || f.webkitRelativePath || f.name;
      /* Strip leading folder name */
      const parts = path.split('/');
      const relPath = parts.length > 1 ? parts.slice(1).join('/') : parts[0];

      log('Uploading (' + (i + 1) + '/' + files.length + ') ' + relPath + ' (' + fmtB(f.size) + ')...');
      $('ct').innerHTML = '<div class="drop" id="dz"><div class="dlbl">Uploading ' + esc(relPath)
        + '<br>(' + (i + 1) + '/' + files.length + ')</div></div>';

      const xhr = await upload('/api/upload_file?name=' + encodeURIComponent(relPath), f, (loaded, total) => {
        const pct = Math.round(loaded * 100 / total);
        showProgress(pct, loaded, total);
      });
      const rd = JSON.parse(xhr.responseText);
      if (!rd.ok) throw new Error(rd.error || 'Upload failed for ' + relPath);
    }
    log('All ' + files.length + ' files uploaded', 'ok');

    /* Step 3: patch AID if provided, unmount, download encrypted */
    log('Encrypting and downloading...');
    $('ct').innerHTML = '<div class="drop"><div class="dlbl">Encrypting save...</div></div>';
    const name = folderName || 'encrypted_save';
    let dlUrl = '/api/download_new?name=' + encodeURIComponent(name);
    if (aidv) dlUrl += '&aid=' + encodeURIComponent(aidv);
    const a = document.createElement('a');
    a.href = dlUrl;
    a.download = isPS4 ? (name + '_ps4.zip') : name;
    document.body.appendChild(a); a.click(); a.remove();
    log('Encrypted save download started', 'ok');

    if (isPS4) {
      $('ct').innerHTML =
        '<div class="drop"><div class="dlbl">PS4 Save: <b>sdimg_' + esc(name) + '</b> + <b>' + esc(name) + '.bin</b></div>'
        + '<div style="color:#0f0">Download started (.zip)</div>'
        + '<div style="font-size:11px;color:var(--dm);margin-top:8px">Extract and place both files in the same directory on PS5</div></div>';
    } else {
      $('ct').innerHTML =
        '<div class="drop"><div class="dlbl">' + esc(name) + '</div>'
        + '<div style="color:#0f0">Download started</div></div>';
    }
  } catch (e) {
    log('Error: ' + e.message, 'err');
    renderCt();
  }
  bsy = false;
}

/* ── Resign drop ───────────────────────────────────── */
async function resignDrop(files) {
  if (bsy || !files.length) return;
  const aidv = document.getElementById('raid').value.trim();
  if (!aidv) { log('Enter new Account ID first', 'err'); return }

  /* Find image file (largest non-.bin) and detect PS4 */
  let imgFile = null, binFile = null;
  for (let i = 0; i < files.length; i++) {
    if (files[i].name.endsWith('.bin')) binFile = files[i];
    else if (!imgFile || files[i].size > imgFile.size) imgFile = files[i];
  }
  if (!imgFile) return;

  const hdr = new Uint8Array(await imgFile.slice(0, 1).arrayBuffer());
  const isPS4 = (hdr[0] === 0x01);

  if (isPS4 && !binFile) {
    log('PS4 save detected — please drop both the save image and its .bin sealed key file together', 'err');
    return;
  }

  bsy = true;
  $('ct').innerHTML = '<div class="drop"><div class="dlbl">Uploading for resign...</div></div>';
  try {
    /* For PS4, upload .bin key first */
    if (isPS4 && binFile) {
      log('Uploading PS4 sealed key ' + binFile.name + '...');
      const kxhr = await upload('/api/upload_key', binFile);
      if (kxhr.status !== 200) throw new Error('Failed to upload .bin key');
    }

    const uidv = document.getElementById('ruid') ? document.getElementById('ruid').value.trim() : '';
    log('Uploading ' + imgFile.name + ' (' + fmtB(imgFile.size) + ') for resign...');
    let rurl = '/api/resign?aid=' + encodeURIComponent(aidv);
    if (isPS4) rurl += '&ps4=1';
    if (uidv) rurl += '&uid=' + encodeURIComponent(uidv);
    const xhr = await upload(rurl, imgFile, (loaded, total) => {
      const pct = Math.round(loaded * 100 / total);
      showProgress(pct, loaded, total);
    });
    const d = JSON.parse(xhr.responseText);
    if (d.error) throw new Error(d.error);
    log('Resigned ' + fmtB(d.size) + ', starting download...', 'ok');
    const name = imgFile.name.replace(/\.[^.]+$/, '') + '_resigned';
    const a = document.createElement('a');
    a.href = '/api/resign_download?name=' + encodeURIComponent(name) + (isPS4 ? '&ps4=1' : '');
    a.download = isPS4 ? (name + '.zip') : name;
    document.body.appendChild(a); a.click(); a.remove();
    $('ct').innerHTML =
      '<div class="drop"><div class="dlbl">' + esc(name) + '<br>' + fmtB(d.size) + '</div>'
      + '<div style="color:#0f0">Download started' + (isPS4 ? ' (.zip)' : '') + '</div></div>';
  } catch (e) {
    log('Error: ' + e.message, 'err');
    renderCt();
  }
  bsy = false;
}

/* ── Mount & browse save ───────────────────────────── */
async function mountBrw(i) {
  if (bsy) return;
  bsy = true;
  const s = S[i];
  try {
    log('Mounting ' + s.title_id + '/' + s.save_name + '...');
    let r = await fetch('/api/mount?idx=' + i);
    let d = await r.json();
    if (d.error) { log('Mount failed: ' + d.error, 'err'); bsy = false; renderCt(); return }
    mt = true;
    cf = d.files || [];
    aid = d.account_id || '';
    stitle = d.save_title || '';
    mtid = d.title_id || '';
    mpt = d.mount || '';
    ex = new Set();
    cf.forEach(f => { if (f.dir) ex.add(f.name) });
    log('Mounted ' + (mtid ? mtid + ' ' : '') + (stitle ? stitle + ' ' : '') + (aid ? '[' + aid + ']' : ''), 'ok');
    renderF();
  } catch (e) {
    log('Error: ' + e.message, 'err');
  }
  bsy = false;
  renderTB();
}

/* ── Render file tree ──────────────────────────────── */
function renderF() {
  $('ct').className = 'ct';
  let h = '';
  cf.forEach((f, i) => {
    const ps = f.name.split('/');
    ps.pop();
    let pp = '', vis = true;
    for (let j = 0; j < ps.length; j++) {
      pp = j ? pp + '/' + ps[j] : ps[j];
      if (!ex.has(pp)) { vis = false; break }
    }
    if (!vis) return;
    const d = f.name.split('/').length - 1;
    const nm = f.name.split('/').pop();
    if (f.dir) {
      const o = ex.has(f.name);
      h += '<div class="fi dir" style="padding-left:' + (16 + d * 16) + 'px" onclick="tog(' + i + ')">';
      h += (o ? '\u25BE \u{1F4C1} ' : '\u25B8 \u{1F4C1} ') + esc(nm) + '</div>';
    } else {
      h += '<div class="fi" style="padding-left:' + (16 + d * 16) + 'px" oncontextmenu="showCtxMenu(event,\'' + esc(f.name).replace(/'/g, "\\'") + '\')">';
      h += '\u{1F4C4} ' + esc(nm) + '<span class="sz">' + fmtB(f.size) + '</span></div>';
    }
  });
  h += '<div class="dh" style="opacity:1;font-size:12px">Tip: Drag & drop files here to add or replace them</div>';
  $('ct').innerHTML = h || '<div class="empty">Empty</div>';
  $('ct').oncontextmenu = e => {
    if (!e.target.closest('.fi:not(.dir)')) { e.preventDefault(); showCtxMenu(e, null); }
  };
  setupDZ('ct', handleBrw);
}

/* ── Context menu for files ────────────────────────── */
function closeCtxMenu() {
  const m = document.getElementById('ctxmenu');
  if (m) m.remove();
}

function showCtxMenu(e, fname) {
  e.preventDefault();
  closeCtxMenu();
  const m = document.createElement('div');
  m.className = 'ctx-menu';
  m.id = 'ctxmenu';
  let items = '';
  if (fname) {
    const fn = esc(fname).replace(/'/g, "\\'");
    items += '<div onclick="ctxDownload(\'' + fn + '\')">Download</div>';
  }
  items += '<div onclick="ctxUpload()">Upload File</div>';
  if (fname) {
    const fn = esc(fname).replace(/'/g, "\\'");
    items += '<div class="ctx-del" onclick="ctxDelete(\'' + fn + '\')">Delete</div>';
  }
  m.innerHTML = items;
  m.style.left = e.clientX + 'px';
  m.style.top = e.clientY + 'px';
  document.body.appendChild(m);
  /* Keep menu within viewport */
  const r = m.getBoundingClientRect();
  if (r.right > window.innerWidth) m.style.left = (window.innerWidth - r.width - 4) + 'px';
  if (r.bottom > window.innerHeight) m.style.top = (window.innerHeight - r.height - 4) + 'px';
}

document.addEventListener('click', closeCtxMenu);

function ctxDownload(name) {
  closeCtxMenu();
  const a = document.createElement('a');
  a.href = '/api/download_file?name=' + encodeURIComponent(name);
  a.download = name.split('/').pop();
  document.body.appendChild(a); a.click(); a.remove();
  log('Downloading ' + name, 'ok');
}

function ctxUpload() {
  closeCtxMenu();
  const i = document.createElement('input');
  i.type = 'file'; i.multiple = true;
  i.onchange = () => { if (i.files.length) handleBrw(i.files) };
  i.click();
}

async function ctxDelete(name) {
  closeCtxMenu();
  if (!confirm('Delete ' + name + '?')) return;
  try {
    const r = await fetch('/api/delete_file?name=' + encodeURIComponent(name));
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    log('Deleted ' + name, 'ok');
    /* Refresh file list */
    const r2 = await fetch('/api/files');
    const d2 = await r2.json();
    cf = d2.files || [];
    ex = new Set();
    cf.forEach(f => { if (f.dir) ex.add(f.name) });
    renderF();
  } catch (e) {
    log('Error: ' + e.message, 'err');
  }
}

/* ── Toggle folder ─────────────────────────────────── */
function tog(i) {
  const n = cf[i].name;
  if (ex.has(n)) ex.delete(n); else ex.add(n);
  renderF();
}

/* ── Confirm replace modal ─────────────────────────── */
function confirmReplace(name) {
  return new Promise(res => {
    const bg = document.createElement('div');
    bg.className = 'modal-bg';
    bg.innerHTML =
      '<div class="modal"><h3>File already exists</h3>'
      + '<p><b>' + esc(name) + '</b> already exists in this save. Replace it?</p>'
      + '<div class="btns">'
      + '<button class="mbtn-s" id="mskip">Skip</button>'
      + '<button class="mbtn-r" id="mrep">Replace</button>'
      + '</div></div>';
    document.body.appendChild(bg);
    $("mrep").onclick = () => { bg.remove(); res(true) };
    $("mskip").onclick = () => { bg.remove(); res(false) };
  });
}

/* ── Handle file drop in browse mode ───────────────── */
async function handleBrw(files) {
  if (bsy || !mt) return;
  bsy = true;
  try {
    for (let j = 0; j < files.length; j++) {
      const file = files[j];
      if (file.name.endsWith('.zip')) {
        log('Extracting ' + file.name + ' (' + fmtB(file.size) + ')...');
        const r = await fetch('/api/upload', {
          method: 'POST',
          headers: { 'Content-Type': 'application/octet-stream' },
          body: file
        });
        const d = await r.json();
        log('Extracted ' + d.files + ' files', 'ok');
      } else {
        const ck = await fetch('/api/file_exists?name=' + encodeURIComponent(file.name));
        const ce = await ck.json();
        if (ce.exists) {
          const ok = await confirmReplace(file.name);
          if (!ok) { log('Skipped ' + file.name); continue }
        }
        log('Uploading ' + file.name + ' (' + fmtB(file.size) + ')...');
        const r = await fetch('/api/upload_file?name=' + encodeURIComponent(file.name), {
          method: 'POST',
          headers: { 'Content-Type': 'application/octet-stream' },
          body: file
        });
        const d = await r.json();
        if (d.ok) log('Added ' + file.name, 'ok');
        else log(d.error, 'err');
      }
    }
    const r2 = await fetch('/api/files');
    const d2 = await r2.json();
    cf = d2.files || [];
    ex = new Set();
    cf.forEach(f => { if (f.dir) ex.add(f.name) });
    renderF();
  } catch (e) {
    log('Error: ' + e.message, 'err');
  }
  bsy = false;
}

/* ── Download as .zip ──────────────────────────────── */
async function dlZip() {
  if (bsy) return;
  bsy = true; renderTB();
  try {
    log('Downloading zip...');
    const r = await fetch('/api/download');
    const b = await r.blob();
    const s = si >= 0 ? S[si] : null;
    dl(b, s ? (s.title_id + '_' + s.save_name + '.zip') : 'save.zip');
    log('Downloaded ' + fmtB(b.size), 'ok');
  } catch (e) {
    log('Error: ' + e.message, 'err');
  }
  bsy = false; renderTB();
}

/* ── Download encrypted binary ─────────────────────── */
async function dlBin() {
  if (bsy || si < 0) return;
  bsy = true; renderTB();
  const s = S[si];
  try {
    log('Unmounting to finalize...');
    await fetch('/api/unmount'); mt = false;
    log('Downloading encrypted save...');
    const r = await fetch('/api/download_raw?idx=' + si);
    const b = await r.blob();
    dl(b, s.title_id + '_' + s.save_name);
    log('Downloaded ' + fmtB(b.size), 'ok');
    si = -1; renderL(); renderTB(); renderCt();
  } catch (e) {
    log('Error: ' + e.message, 'err');
  }
  bsy = false;
}

/* ── Dump to USB with progress ─────────────────────── */
async function dumpUsb() {
  if (bsy || si < 0) return;
  bsy = true; renderTB();
  const s = S[si];
  try {
    log('Dumping ' + s.title_id + '/' + s.save_name + ' to USB...');
    const r = await fetch('/api/dump_usb?idx=' + si);
    const reader = r.body.getReader();
    const dec = new TextDecoder();
    let buf = '', last = null;
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const ln of lines) {
        if (!ln) continue;
        const j = JSON.parse(ln);
        if (j.error) throw new Error(j.error);
        if (j.progress !== undefined) {
          const tb = $('tb');
          let bar = document.getElementById('usbprog');
          if (!bar) {
            bar = document.createElement('div');
            bar.id = 'usbprog';
            bar.style.cssText = 'width:100%;height:4px;background:var(--bd);border-radius:2px;margin-top:4px';
            bar.innerHTML = '<div style="height:100%;background:var(--ac);border-radius:2px;transition:width .1s;width:0%"></div>';
            tb.appendChild(bar);
          }
          bar.firstChild.style.width = j.progress + '%';
          log('USB dump: ' + j.progress + '% (' + fmtB(j.copied) + '/' + fmtB(j.total) + ')');
        }
        if (j.ok) last = j;
      }
    }
    if (last) log('Dumped to ' + last.path + ' (' + fmtB(last.size) + ')', 'ok');
    const bar = document.getElementById('usbprog');
    if (bar) bar.remove();
  } catch (e) {
    log('Error: ' + e.message, 'err');
    const bar = document.getElementById('usbprog');
    if (bar) bar.remove();
  }
  bsy = false; renderTB();
}

/* ── Unmount ───────────────────────────────────────── */
async function um() {
  if (bsy) return;
  bsy = true; renderTB();
  try {
    log('Unmounting...');
    await fetch('/api/unmount'); mt = false;
    si = -1; renderL(); renderTB(); renderCt();
    log('Unmounted', 'ok');
  } catch (e) {
    log('Error: ' + e.message, 'err');
  }
  bsy = false;
}

/* ── Download helper ───────────────────────────────── */
function dl(b, n) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(b);
  a.download = n;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove() }, 1e3);
}

/* ── Shutdown ──────────────────────────────────────── */
async function shutdown() {
  if (!confirm('Kill GarlicMgr?')) return;
  log('Killing GarlicMgr...');
  try { await fetch('/api/shutdown') } catch (e) {}
  log('GarlicMgr killed', 'ok');
  document.body.style.opacity = '.3';
}

/* ── Init ──────────────────────────────────────────── */
load();
renderCt();
renderTB();
</script>
